name: Regenerate Market Intelligence Reports

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday 7am CT (UTC-6)
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate reports
        env:
          TABLEAU_PAT_NAME:   ${{ secrets.TABLEAU_PAT_NAME }}
          TABLEAU_PAT_SECRET: ${{ secrets.TABLEAU_PAT_SECRET }}
        run: |
          python generate_market_report.py --dma "Mobile-Pensacola" --makes "Hyundai" --force-tableau

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-regenerate reports $(date +'%Y-%m-%d')"
            git push
          fi
